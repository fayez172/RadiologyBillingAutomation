# TeleRad Edge Agent Configuration
# Placeholders like ${VAR} will be resolved from environment variables.

instance_id: "${AGENT_INSTANCE_ID}"
api_key: "${AGENT_API_KEY}"
api_endpoint: "${AGENT_API_ENDPOINT}"

mssql:
  host: "${MSSQL_HOST}"
  port: 1433
  user: "${MSSQL_USER}"
  password: "${MSSQL_PASSWORD}"
  radiology_db: "RADSpaRISRadiologyDB"
  reporting_db: "RADSpaRISReportingDB"

backfill:
  enabled: false
  from_date: "2025-01-01"
  to_date: "2025-01-31"
  batch_size: 500

polling:
  finished_reports_seconds: 30
  reference_data_hours: 24

logging:
  level: "INFO"
  max_file_size_mb: 5
  backup_count: 3
